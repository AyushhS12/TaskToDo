<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoAuth | Login & Signup</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-card">
    <div class="tabs">
        <div class="slider" id="slider"></div>
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Signup</button>
    </div>

    <h2 id="form-title" style="margin-top: 0;">Welcome Back</h2>
    <p id="error-msg"></p>

    <form class="auth-form" id="authForm">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="you@example.com">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>

        <div class="input-group signup-only" id="confirmGroup">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
    </form>
</div>

<script>
    let mode = 'login';

    function switchTab(newMode) {
        mode = newMode;
        const slider = document.getElementById('slider');
        const title = document.getElementById('form-title');
        const submitBtn = document.getElementById('submitBtn');
        const confirmGroup = document.getElementById('confirmGroup');
        const buttons = document.querySelectorAll('.tab-btn');

        if (mode === 'signup') {
            slider.style.transform = 'translateX(100%)';
            title.innerText = 'Create Account';
            submitBtn.innerText = 'Join Now';
            confirmGroup.style.display = 'flex';
            buttons[1].classList.add('active');
            buttons[0].classList.remove('active');
        } else {
            slider.style.transform = 'translateX(0)';
            title.innerText = 'Welcome Back';
            submitBtn.innerText = 'Sign In';
            confirmGroup.style.display = 'none';
            buttons[0].classList.add('active');
            buttons[1].classList.remove('active');
        }
        document.getElementById('error-msg').innerText = '';
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const endpoint = mode === 'login' ? '/login' : '/signup';

        // Add validation for signup
        if(mode === 'signup') {
            const confirm = document.getElementById('confirmPassword').value;
            if(password !== confirm) {
                document.getElementById('error-msg').innerText = "Passwords don't match!";
                return;
            }
        }

        try {
            const response = await fetch("http://localhost:8080"+endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = '/dashboard'; // Redirect on success
            } else {
                document.getElementById('error-msg').innerText = data.error || "Something went wrong";
            }
        } catch (err) {
            document.getElementById('error-msg').innerText = "Server connection failed";
        }
    });
</script>

</body>
</html>
