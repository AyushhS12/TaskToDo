<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTodo | Stay Productive</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>TaskTodo</h1>
    </header>

    <div class="todo-input-group">
        <input type="text" id="todo-title" placeholder="What needs to be done?">
        <textarea id="todo-desc" placeholder="Add a description..."></textarea>
        <button class="btn-add" id="add-btn">Add Task</button>
    </div>

    <ul id="todo-list">
        <li class="todo-item">
            <div class="todo-info">
                <h3>Practice Node.js</h3>
                <p>Connect the backend with this cool UI.</p>
            </div>
            <div class="todo-actions">
                <button class="action-btn btn-check">✓</button>
                <button class="action-btn btn-edit">✎</button>
                <button class="action-btn btn-delete">✕</button>
            </div>
        </li>
    </ul>
</div>
